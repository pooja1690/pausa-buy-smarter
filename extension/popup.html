<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #44413c;
        --muted: #8a8378;
        --accent: #55614b;
        --accent-soft: rgba(85,97,75,0.12);
        --line: #d8cfc4;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 320px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * { box-sizing: border-box; }
      .wrap { padding: 18px 18px 14px; }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
      }
      .dot {
        width: 20px; height: 20px; border-radius: 999px;
        background: var(--accent-soft);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .dot::before, .dot::after {
        content: ""; width: 3px; height: 8px; background: var(--accent);
        border-radius: 2px; margin: 0 1px;
      }
      h1 { font-size: 17px; line-height: 1.3; margin: 12px 0 4px; font-weight: 600; }
      p.lead { font-size: 12px; color: var(--muted); margin: 0 0 14px; line-height: 1.5; }

      .source-pill {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--accent-soft); color: var(--accent);
        font-size: 11px; padding: 4px 10px; border-radius: 999px;
        margin-bottom: 12px; max-width: 100%;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .source-pill .tag {
        font-size: 9px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.06em;
      }

      label { display: block; font-size: 11px; color: var(--muted); margin: 0 0 4px 2px; letter-spacing: 0.02em; }
      input[type="text"], input[type="number"] {
        width: 100%; background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 9px 11px;
        font-size: 13px; color: var(--ink); font-family: inherit;
        outline: none; transition: border-color 0.15s;
        text-overflow: ellipsis;
      }
      input:focus { border-color: var(--accent); text-overflow: clip; }
      .field { margin-bottom: 10px; }
      .price-row { display: flex; align-items: center; gap: 6px; }
      .price-row .prefix { color: var(--muted); font-size: 13px; padding-left: 2px; }
      .detected { font-size: 10px; color: var(--accent); margin: 4px 2px 0; opacity: 0.8; }

      button.primary {
        display: block; width: 100%;
        background: var(--accent); color: white;
        text-align: center; font-size: 14px; font-weight: 500;
        padding: 11px; border-radius: 999px; border: 0;
        cursor: pointer; font-family: inherit; margin-top: 4px;
      }
      button.primary:hover { opacity: 0.92; }
      button.ghost {
        display: block; width: 100%;
        background: transparent; color: var(--muted);
        font-size: 11px; padding: 8px; border-radius: 999px;
        border: 0; cursor: pointer; font-family: inherit; margin-top: 4px;
      }
      button.ghost:hover { color: var(--ink); }
      button.ghost.active { color: var(--accent); }

      /* Verdict view */
      .verdict {
        background: white; border: 1px solid var(--line);
        border-radius: 14px; padding: 16px; margin-top: 4px;
      }
      .verdict .badge {
        display: inline-block; font-size: 10px; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--accent);
        background: var(--accent-soft); padding: 3px 9px; border-radius: 999px;
        margin-bottom: 8px;
      }
      .verdict h2 {
        font-size: 24px; font-weight: 700; margin: 0 0 6px; color: var(--accent);
        letter-spacing: 0.02em;
      }
      .verdict .item-name {
        font-size: 12px; color: var(--ink); font-weight: 500;
        margin: 0 0 8px;
        overflow: hidden; text-overflow: ellipsis;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      }
      .verdict p.why {
        font-size: 12px; color: var(--muted); line-height: 1.5; margin: 0 0 12px;
      }
      .verdict .actions { display: flex; gap: 8px; }
      .verdict .actions button {
        flex: 1; font-family: inherit; font-size: 12px; padding: 9px;
        border-radius: 999px; border: 1px solid var(--line);
        background: white; color: var(--ink); cursor: pointer;
      }
      .verdict .actions button.alt { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap" id="formView">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <h1>Take a 10-second pause.</h1>
      <p class="lead">Confirm what you're buying — we'll do the rest.</p>

      <div class="source-pill" id="sourcePill" hidden>
        <span class="tag">Source</span>
        <span id="sourceHost">—</span>
      </div>

      <div class="field">
        <label for="item">Item</label>
        <input type="text" id="item" placeholder="e.g. wireless headphones" autocomplete="off" title="" />
        <div class="detected" id="detected" hidden>Detected from page</div>
      </div>

      <div class="field">
        <label for="price">Price (optional)</label>
        <div class="price-row">
          <span class="prefix">$</span>
          <input type="number" id="price" step="0.01" min="0" placeholder="0.00" />
        </div>
      </div>

      <button class="primary" id="open">Help me decide</button>
      <button class="ghost" id="mute" hidden>Don't show on this site</button>
    </div>

    <div class="wrap" id="verdictView" hidden>
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <div class="verdict" style="margin-top: 14px;">
        <span class="badge">Routine essential</span>
        <h2>BUY</h2>
        <p class="item-name" id="vItem">—</p>
        <p class="why">If you're out or running low, this is a reasonable buy. Keep it practical — don't upgrade just because it's on sale.</p>
        <div class="actions">
          <button id="vBack">Back</button>
          <button id="vDeep" class="alt">Pausa anyway</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
