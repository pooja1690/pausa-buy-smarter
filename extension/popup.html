<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #44413c;
        --muted: #8a8378;
        --accent: #55614b;
        --line: #d8cfc4;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 320px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * { box-sizing: border-box; }
      .wrap { padding: 18px 18px 14px; }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
      }
      .dot {
        width: 20px; height: 20px; border-radius: 999px;
        background: rgba(85,97,75,0.15);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .dot::before, .dot::after {
        content: ""; width: 3px; height: 8px; background: var(--accent);
        border-radius: 2px; margin: 0 1px;
      }
      h1 { font-size: 17px; line-height: 1.3; margin: 12px 0 4px; font-weight: 600; }
      p.lead { font-size: 12px; color: var(--muted); margin: 0 0 14px; line-height: 1.5; }
      .ctx {
        background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 8px 10px;
        font-size: 11px; color: var(--muted);
        margin-bottom: 12px;
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
      }
      .ctx .host {
        color: var(--ink); font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .ctx .tag {
        font-size: 9px; background: rgba(85,97,75,0.12);
        color: var(--accent); padding: 3px 7px; border-radius: 999px;
        text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
      }
      label { display: block; font-size: 11px; color: var(--muted); margin: 0 0 4px 2px; letter-spacing: 0.02em; }
      input[type="text"], input[type="number"] {
        width: 100%; background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 9px 11px;
        font-size: 13px; color: var(--ink); font-family: inherit;
        outline: none; transition: border-color 0.15s;
      }
      input:focus { border-color: var(--accent); }
      .field { margin-bottom: 10px; }
      .price-row { display: flex; align-items: center; gap: 6px; }
      .price-row .prefix { color: var(--muted); font-size: 13px; padding-left: 2px; }
      .detected { font-size: 10px; color: var(--accent); margin: 4px 2px 0; opacity: 0.8; }
      button.primary {
        display: block; width: 100%;
        background: var(--accent); color: white;
        text-align: center; font-size: 14px; font-weight: 500;
        padding: 11px; border-radius: 999px; border: 0;
        cursor: pointer; font-family: inherit; margin-top: 4px;
      }
      button.primary:hover { opacity: 0.92; }
      button.ghost {
        display: block; width: 100%;
        background: transparent; color: var(--muted);
        font-size: 11px; padding: 8px; border-radius: 999px;
        border: 0; cursor: pointer; font-family: inherit; margin-top: 4px;
      }
      button.ghost:hover { color: var(--ink); }
      button.ghost.active { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <h1>Take a 10-second pause.</h1>
      <p class="lead">Confirm what you're buying — we'll do the rest.</p>

      <div class="ctx" id="ctx" hidden>
        <span class="host" id="host">—</span>
        <span class="tag" id="tag" hidden>Shopping</span>
      </div>

      <div class="field">
        <label for="item">Item</label>
        <input type="text" id="item" placeholder="e.g. wireless headphones" autocomplete="off" />
        <div class="detected" id="detected" hidden>Detected from page</div>
      </div>

      <div class="field">
        <label for="price">Price (optional)</label>
        <div class="price-row">
          <span class="prefix">$</span>
          <input type="number" id="price" step="0.01" min="0" placeholder="0.00" />
        </div>
      </div>

      <button class="primary" id="open">Help me decide</button>
      <button class="ghost" id="mute" hidden>Mute this site</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
