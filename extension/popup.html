<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #44413c;
        --muted: #8a8378;
        --accent: #55614b;
        --line: #d8cfc4;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 380px;
        min-height: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * { box-sizing: border-box; }
      .wrap { padding: 18px 18px 14px; }
      .view[hidden] { display: none; }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
      }
      .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        margin-bottom: 14px;
      }
      .icon-btn {
        width: 30px; height: 30px; border-radius: 999px; border: 1px solid var(--line);
        background: white; color: var(--ink); cursor: pointer; font-size: 17px; line-height: 1;
      }
      .dot {
        width: 20px; height: 20px; border-radius: 999px;
        background: rgba(85,97,75,0.15);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .dot::before, .dot::after {
        content: ""; width: 3px; height: 8px; background: var(--accent);
        border-radius: 2px; margin: 0 1px;
      }
      h1 {
        font-size: 17px; line-height: 1.3;
        margin: 12px 0 4px; font-weight: 600;
      }
      p.lead {
        font-size: 12px; color: var(--muted);
        margin: 0 0 14px; line-height: 1.5;
      }
      .ctx {
        background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 8px 10px;
        font-size: 11px; color: var(--muted);
        margin-bottom: 12px;
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
      }
      .ctx .host {
        color: var(--ink); font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .ctx .tag {
        font-size: 9px; background: rgba(85,97,75,0.12);
        color: var(--accent); padding: 3px 7px; border-radius: 999px;
        text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
      }
      label {
        display: block; font-size: 11px; color: var(--muted);
        margin: 0 0 4px 2px; letter-spacing: 0.02em;
      }
      input[type="text"], input[type="number"] {
        width: 100%; box-sizing: border-box;
        background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 9px 11px;
        font-size: 13px; color: var(--ink); font-family: inherit;
        outline: none; transition: border-color 0.15s;
      }
      input:focus { border-color: var(--accent); }
      .field { margin-bottom: 10px; }
      .price-row { display: flex; align-items: center; gap: 6px; }
      .price-row .prefix {
        color: var(--muted); font-size: 13px; padding-left: 2px;
      }
      .detected {
        font-size: 10px; color: var(--accent);
        margin: 4px 2px 0; opacity: 0.8;
      }
      button.primary {
        display: block; width: 100%;
        background: var(--accent); color: white;
        text-align: center; font-size: 14px; font-weight: 500;
        padding: 11px; border-radius: 999px; border: 0;
        cursor: pointer; font-family: inherit; box-sizing: border-box;
        margin-top: 4px;
      }
      button.primary:hover { opacity: 0.92; }
      .progress {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        flex: 1;
      }
      .progress span {
        width: 7px; height: 7px; border-radius: 999px; background: var(--line);
      }
      .progress span.active { background: var(--accent); }
      .question-kicker {
        margin: 10px 0 8px;
        color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
      }
      .question-title {
        font-size: 24px; line-height: 1.16; font-weight: 650; margin: 0 0 18px;
        overflow-wrap: anywhere;
      }
      .item-chip {
        max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: 11px; color: var(--muted); margin-bottom: 14px;
      }
      .answers { display: grid; gap: 9px; }
      .answer {
        width: 100%; border: 1px solid var(--line); background: white; color: var(--ink);
        border-radius: 12px; padding: 12px 14px; font: inherit; font-size: 13px; font-weight: 600;
        cursor: pointer; text-align: center;
      }
      .answer.primary-answer { background: var(--accent); color: white; border-color: var(--accent); }
      .result-card {
        border-radius: 16px; padding: 18px; background: var(--accent); color: white; margin: 10px 0 14px;
      }
      .result-card.wait { background: #dab8a2; color: var(--ink); }
      .result-card.skip { background: #d8cfc4; color: var(--ink); }
      .result-label { font-size: 38px; line-height: 1; font-weight: 750; margin: 0 0 12px; }
      .result-copy { font-size: 13px; line-height: 1.45; margin: 0; }
      button.ghost {
        display: block; width: 100%;
        background: transparent; color: var(--muted);
        font-size: 11px; padding: 8px; border-radius: 999px;
        border: 0; cursor: pointer; font-family: inherit; margin-top: 4px;
      }
      button.ghost:hover { color: var(--ink); }
      button.ghost.active { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap view" id="entryView">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <h1>Take a 10-second pause.</h1>
      <p class="lead">Confirm what you're buying — we'll do the rest.</p>

      <div class="ctx" id="ctx" hidden>
        <span class="host" id="host">—</span>
        <span class="tag" id="tag" hidden>Shopping</span>
      </div>

      <div class="field">
        <label for="item">Item</label>
        <input type="text" id="item" placeholder="e.g. wireless headphones" autocomplete="off" />
        <div class="detected" id="detected" hidden>Detected from page</div>
      </div>

      <div class="field">
        <label for="price">Price (optional)</label>
        <div class="price-row">
          <span class="prefix">$</span>
          <input type="number" id="price" step="0.01" min="0" placeholder="0.00" />
        </div>
      </div>

      <button class="primary" id="open">Help me decide</button>
      <button class="ghost" id="mute" hidden>Mute this site</button>
    </div>

    <div class="wrap view" id="questionView" hidden>
      <div class="topbar">
        <button class="icon-btn" id="back" aria-label="Back">‹</button>
        <div class="progress" id="progress" aria-label="Question progress"></div>
        <span style="width:30px"></span>
      </div>
      <div class="question-kicker" id="questionKicker">Question 1 of 4</div>
      <div class="item-chip" id="questionItem"></div>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="answers" id="answers"></div>
    </div>

    <div class="wrap view" id="resultView" hidden>
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <div class="result-card" id="resultCard">
        <div class="result-label" id="resultLabel">WAIT</div>
        <p class="result-copy" id="resultCopy"></p>
      </div>
      <button class="primary" id="again">Decide on something else</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
