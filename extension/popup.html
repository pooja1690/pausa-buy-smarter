<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #44413c;
        --muted: #8a8378;
        --accent: #55614b;
        --line: #d8cfc4;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 320px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      .wrap { padding: 20px 18px 16px; }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
      .dot {
        width: 22px; height: 22px; border-radius: 999px;
        background: rgba(85,97,75,0.15);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .dot::before, .dot::after {
        content: ""; width: 3px; height: 9px; background: var(--accent);
        border-radius: 2px; margin: 0 1px;
      }
      h1 {
        font-size: 20px;
        line-height: 1.25;
        margin: 16px 0 6px;
        font-weight: 600;
      }
      p.lead {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 16px;
        line-height: 1.5;
      }
      .ctx {
        background: white;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .ctx .host {
        color: var(--ink);
        font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .ctx .tag {
        font-size: 10px;
        background: rgba(85,97,75,0.12);
        color: var(--accent);
        padding: 3px 8px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
      button.primary, a.primary {
        display: block;
        width: 100%;
        background: var(--accent);
        color: white;
        text-align: center;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 12px;
        border-radius: 999px;
        border: 0;
        cursor: pointer;
        font-family: inherit;
        box-sizing: border-box;
      }
      button.primary:hover, a.primary:hover { opacity: 0.92; }
      button.ghost {
        display: block;
        width: 100%;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        padding: 10px;
        border-radius: 999px;
        border: 0;
        cursor: pointer;
        font-family: inherit;
        margin-top: 6px;
      }
      button.ghost:hover { color: var(--ink); }
      button.ghost.active { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span>PAUSA</span>
      </div>
      <h1>Take a calm 10-second pause before you buy.</h1>
      <p class="lead">A few quick taps. Get a Buy, Wait, or Skip verdict.</p>

      <div class="ctx" id="ctx" hidden>
        <span class="host" id="host">—</span>
        <span class="tag" id="tag" hidden>Shopping</span>
      </div>

      <a class="primary" id="open" href="https://askpausa.com/?utm_source=ext" target="_blank" rel="noopener">
        Help me decide
      </a>
      <button class="ghost" id="mute" hidden>Mute this site</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
