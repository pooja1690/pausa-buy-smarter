<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pausa</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #44413c;
        --muted: #8a8378;
        --accent: #55614b;
        --line: #d8cfc4;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 380px;
        height: 580px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        overflow: hidden;
      }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      iframe {
        flex: 1;
        width: 100%;
        border: 0;
        background: var(--bg);
      }
      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-top: 1px solid var(--line);
        font-size: 12px;
        color: var(--muted);
        background: var(--bg);
      }
      .bar button {
        appearance: none;
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink);
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        cursor: pointer;
        font-family: inherit;
      }
      .bar button:hover { border-color: var(--accent); color: var(--accent); }
      .bar .host { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
      .bar .muted-tag { color: var(--accent); font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <iframe id="app" src="https://askpausa.com/?embed=ext" title="Ask Pausa"></iframe>
      <div class="bar">
        <span class="host" id="host">—</span>
        <button id="mute">Mute this site</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
